<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Cezy-3DAnimation</title>
        <style>
            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
            }

            html,body{
                width:100%;
                height:100%;
                overflow:hidden;
                background:#f4f2ee;
                cursor:none;
            }

            .fui-background{
                position:fixed;
                inset:0;
                background:
                linear-gradient(
                    rgba(66,66,66,0.05) 1px,
                    transparent 1px
                ),

                linear-gradient(
                    90deg,
                    rgba(66,66,66,0.05) 1px,
                    transparent 1px
                );
                background-size:40px 40px;
                opacity:1;
                z-index:0;
            }

            canvas{
                position:fixed;
                inset:0;
                width:100%;
                height:100%;
                display:block;
            }
            
            #bgCanvas{
                position:fixed;
                inset:0;
                z-index:0;
            }   

            .hud{
                position:fixed;
                inset:0;
                pointer-events:none;
                z-index:2;
            }

            #fogCanvas{
                position:fixed;
                inset:0;
                z-index:5;
                pointer-events:none;
            }

            #particleCanvas{
                position:fixed;
                inset:0;
                z-index:10;
                pointer-events:none;
            }

            .tech-circle{
                position:absolute;
                width:900px;
                height:900px;

                border:1px solid rgba(66,66,66,0.36);
                background:rgba(100,100,200,1);
                border-radius:50%;
                opacity:0.7;

                transform: translate3d(0,0,0);
                will-change: transform;
            }
            .tech-circle::before{
                content:"";
                position:absolute;
                inset:0;
                border-radius:70%;
                background:rgba(0,100,200,0.55);

                filter: blur(20px);
                transform: scale(1.05);
                z-index:-1;
            }
            .tech-circle-1{
                right:-10%;
                top:40%;
            }
            .tech-circle-2{
                left:-10%;
                top:-22%;
            }
           
            .panel{
                position:absolute;
                backdrop-filter:blur(3px);
                font-size:12px;
                letter-spacing:2px;
                color:rgba(66,66,66,0.55);
                font-family:Arial,sans-serif;
            }
            .panel-1{
                padding:10px 10px;
                background:rgba(66,66,66,0.32);
                border:1px solid rgba(66,66,66,0.08);
                left:1.7%;
                bottom:5%;
                display:inline-flex;
                align-items:center;
                width:auto;
                height:auto;
                min-height:60px;
            }
            .panel-2{
                right:5%;
                top:8%;
                width:120px;
                height:120px;
                z-index:10;
                background:none;
                border:none;
                opacity:1;
            }
            .text-sub{
                font-size:clamp(24px, 2.4vw, 43px);
                font-weight:1000;
                letter-spacing:0px;
                color:rgba(242,242,242,0.95);
                font-family:Helvetica, Arial,"PingFang SC","Microsoft YaHei", sans-serif;
                white-space: nowrap;
                line-height:1;
            }
            .logo{
                width:120px;
                height:auto;
                display:block;
                margin-bottom:8px;
                opacity:0.3;
            }

            .crosshair{
                position:absolute;
                left:50%;
                top:50%;
                width:120px;
                height:120px;
                transform:translate(-50%,-50%);
                border:1px solid rgba(66,66,66,0.04);
                border-radius:50%;
            }

            .hint{
                position:fixed;
                left:30px;
                bottom:24px;
                color:rgba(66,66,66,0.92);
                font-family:Arial, sans-serif;
                font-size:11px;
                letter-spacing:3px;
                pointer-events:none;
                user-select:none;
            }

            .enter-button{
                position:fixed;
                left:50%;
                bottom:42px;
                transform:translateX(-50%);
                width:64px;
                height:64px;

                border-radius:50%;
                border:1px solid rgba(66,66,66,0.18);
                display:flex;
                align-items:center;
                justify-content:center;
                background:rgba(66,66,66,0.03);
                backdrop-filter: blur(10px);
                text-decoration:none;
                opacity:0.65;
                transition:
                    transform 0.4s ease,
                    background 0.4s ease,
                    border-color 0.4s ease,
                    opacity 0.4s ease;

                z-index:100;
                animation: floatArrow 3s ease-in-out infinite;
            }
            .enter-button:hover{
                cursor:pointer;
                transform:
                    translateX(-50%)
                    translateY(-8px)
                    scale(1.08);
                background:rgba(66,66,66,0.15);
                border-color:rgba(66,66,66,0.4);
                opacity:1;
            }

            @keyframes floatArrow{

                0%{
                    transform:
                        translateX(-50%)
                        translateY(0px);
                }

                50%{
                    transform:
                        translateX(-50%)
                        translateY(-10px);
                }

                100%{
                    transform:
                        translateX(-50%)
                        translateY(0px);
                }
            }

            @keyframes drift{

                0%{
                    transform:translateY(0px);
                }

                50%{
                    transform:translateY(-12px);
                }

                100%{
                    transform:translateY(0px);
                }
            }

            .panel-2{
                animation:drift 10s ease-in-out infinite;
            }

            @keyframes driftB{

                0%{
                    transform:translateY(0px);
                }

                50%{
                    transform:translateY(-52px);
                }

                100%{
                    transform:translateY(0px);
                }
            }
        </style>
    </head>

    <body>
        <div class="fui-background"></div>

        <div class="hud">
            <div class="grid-lines"></div>
            <div class="tech-circle tech-circle-1"></div>
            <div class="tech-circle tech-circle-2"></div>
            <div class="panel panel-1">
                <div class="text-sub">CHEN ZHE 陈哲</div>
            </div>
            <div class="crosshair"></div>
        </div>

        <div class="panel panel-2">
                <img class="logo" src="logo_Cezy.png" alt="logo">
        </div>

        <canvas id="bgCanvas"></canvas>
        <canvas id="fogCanvas"></canvas>
        <canvas id="particleCanvas"></canvas>  

        <a class="enter-button" href="main.html">
            <svg width="22" height="22" viewBox="0 0 24 24">
                <path
                d="M12 5V19M12 19L6 13M12 19L18 13"
                stroke=#888888
                stroke-width="1.5"
                fill="none"
                stroke-linecap="round"
                stroke-linejoin="round"
                />
            </svg>
        </a>

        <div class="hint">
            COMMUNICATION UNIVERSITY OF ZHEJIANG
        </div>

        <script>

        const bgCanvas = document.getElementById('bgCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        const particleCanvas = document.getElementById('particleCanvas');
        const ctx = particleCanvas.getContext('2d');
        const fogCanvas = document.getElementById('fogCanvas');
        const fogCtx = fogCanvas.getContext('2d');

        let viewW = window.innerWidth;
        let viewH = window.innerHeight;
        const DPR = window.devicePixelRatio || 1;

        const offscreen = document.createElement('canvas');
        const offCtx = offscreen.getContext('2d');

        const mouse = {
            x: viewW,
            y: viewH*0,

            prevX: viewW * 0.5,
            prevY: viewH * 0.5,

            vx: 0,
            vy: 0,

            radius: 140
        };

        let textParticles = [];
        let dustParticles = [];
        let burstParticles = [];
        let flowTrails = [];

        /* =========================
           TEXT Particles
        ========================= */

        class TextParticle{

            constructor(x,y){

                this.originX = x;
                this.originY = y;

                this.x = x + (Math.random()-0.5)*10;
                this.y = y + (Math.random()-0.5)*10;

                this.vx = 0;
                this.vy = 0;

                this.size = Math.random() * 1.2 + 0.4;

                this.angle = Math.random() * Math.PI * 2;
                this.floatRadius = Math.random() * 2 + 1;

                this.ease = 0.005;
                this.friction = 0.70;
            }

            update(time){

                // 缓慢漂浮
                const driftX =
                    Math.sin(time * 0.0007 + this.angle * 3.7) * this.floatRadius;

                const driftY =
                    Math.cos(time * 0.0013 + this.angle * 2.1) * this.floatRadius;

                const floatX = this.originX + driftX;
                const floatY = this.originY + driftY;

                let dx = this.x - mouse.x;
                let dy = this.y - mouse.y;

                let dist = Math.sqrt(dx*dx + dy*dy);

                if(dist < mouse.radius){

                    let force = (mouse.radius - dist) / mouse.radius;
                    let angle = Math.atan2(dy,dx);
                    let push = force * 3.8;

                    this.vx += Math.cos(angle) * push;
                    this.vy += Math.sin(angle) * push;

                    // 鼠标增殖
                    if(Math.random() < 0.012){
                        burstParticles.push(new BurstParticle(this.x,this.y));
                    }
                }

                // 回弹
                this.vx += (floatX - this.x) * this.ease;
                this.vy += (floatY - this.y) * this.ease;

                // 阻尼
                this.vx *= this.friction;
                this.vy *= this.friction;

                this.x += this.vx;
                this.y += this.vy;
            }

            draw(){

                ctx.beginPath();

                ctx.fillStyle = "rgba(66,66,66,0.95)";

                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);

                ctx.fill();
            }
        }

        /* =========================
            DUST Particles - BG
        ========================= */

        class DustParticle{

            constructor(){

                this.reset();
            }

            reset(){

                this.x = Math.random() * viewW;
                this.y = Math.random() * viewH;

                this.size = Math.random() * 1.4 + 0.2;

                this.speedX = (Math.random()-0.5) * 0.08;
                this.speedY = (Math.random()-0.5) * 0.08;

                this.alpha = Math.random() * 0.3 + 0.55;
            }

            update(){

                this.x += this.speedX;
                this.y += this.speedY;

                if(this.x < 0) this.x = viewW;
                if(this.x > viewW) this.x = 0;

                if(this.y < 0) this.y = viewH;
                if(this.y > viewH) this.y = 0;
            }

            draw(){

                ctx.beginPath();

                ctx.fillStyle = `rgba(66,66,66,${this.alpha})`;

                ctx.arc(this.x,this.y,this.size,0,Math.PI*2);

                ctx.fill();
            }
        }

        /* =========================
           BRUST Particles - Mouse
        ========================= */

        class BurstParticle{

            constructor(x,y){

                this.x = x;
                this.y = y;

                this.vx = (Math.random()-0.5) * 1;
                this.vy = (Math.random()-0.5) * 1;

                this.life = 1;

                this.size = Math.random()*1.1 + 0.5;
            }

            update(){

                this.x += this.vx;
                this.y += this.vy;

                this.vx *= 0.96;
                this.vy *= 0.96;

                this.life -= 0.005;
            }

            draw(){

                ctx.beginPath();

                ctx.fillStyle = `rgba(66,66,66,${this.life})`;

                ctx.arc(this.x,this.y,this.size,0,Math.PI*2);

                ctx.fill();
            }
        }

        /* =========================
           FlowTrail - Mouse
        ========================= */

        class FlowTrail{

            constructor(x,y,vx,vy){

                this.x = x;
                this.y = y;

                this.vx = vx;
                this.vy = vy;

                this.life = 1;

                this.size = Math.random()*18 + 12;

                this.noise = Math.random() * Math.PI * 2;
            }

            update(time){

                // 流体摆动
                this.vx += Math.sin(time*0.001 + this.noise) * 0.02;
                this.vy += Math.cos(time*0.0015 + this.noise) * 0.02;

                // 阻尼
                this.vx *= 0.96;
                this.vy *= 0.96;

                this.x += this.vx;
                this.y += this.vy;

                // 生命周期
                this.life *= 0.965;
            }

            draw(){

                const gradient = ctx.createRadialGradient(
                    this.x,
                    this.y,
                    0,
                    this.x,
                    this.y,
                    this.size
                );

                gradient.addColorStop(
                    0,
                    `rgba(255,255,255,${this.life * 0.08})`
                );

                gradient.addColorStop(
                    1,
                    `rgba(255,255,255,0)`
                );

                ctx.beginPath();

                ctx.fillStyle = gradient;

                ctx.arc(
                    this.x,
                    this.y,
                    this.size,
                    0,
                    Math.PI*2
                );

                ctx.fill();
            }
        }


        /* =========================
           CREATE TEXT
        ========================= */

        function createText(){

            textParticles = [];

            offCtx.clearRect(0,0,viewW,viewH);

            const fontSize = Math.min(viewW * 0.28, 340);

            offCtx.fillStyle = "white";

            offCtx.textAlign = "center";
            offCtx.textBaseline = "middle";

            offCtx.font = `1000 ${fontSize}px Arial Black`;
            offCtx.fillText("三维动画", viewW/2, viewH/2);

            const data = offCtx.getImageData(0,0,viewW,viewH).data;

            const gap = 4; //数量

            for(let y=0; y<viewH; y+=gap){

                for(let x=0; x<viewW; x+=gap){

                    const index = (y * viewW + x) * 4;

                    if(data[index + 3] > 120){

                        textParticles.push(
                            new TextParticle(x,y)
                        );
                    }
                }
            }
        }

        /* =========================
           CREATE DUST
        ========================= */

        function createDust(){

            dustParticles = [];

            for(let i=0; i<900; i++){

                dustParticles.push(
                    new DustParticle()
                );
            }
        }

        /* =========================
           Vignette
        ========================= */

        function drawVignette(ctx, w, h){

            ctx.clearRect(0,0,w,h);

            const g = ctx.createRadialGradient(
                w/2, h/2, 0,
                w/2, h/2, w*0.75
            );

            g.addColorStop(0, "rgba(255,255,255,0.03)");
            g.addColorStop(1, "rgba(0,0,0,0.95)");

            ctx.fillStyle = g;
            ctx.fillRect(0,0,w,h);
        }

        /* =========================
           ALL-ANIMATION
        ========================= */

        function animate(time){

            ctx.clearRect(0,0,viewW,viewH);

            // 0. BACKGROUND LAYER
            bgCtx.clearRect(0,0,viewW,viewH);


            // 5. FOG LAYER
            drawVignette(fogCtx, viewW, viewH);

            // 10. PARTICLE LAYER
            // dust
            for(let dust of dustParticles){

                dust.update();
                dust.draw();
            }

            // text
            for(let particle of textParticles){

                particle.update(time);
                particle.draw();
            }

            // burst Particles
            for(let i = burstParticles.length-1; i>=0; i--){

                const p = burstParticles[i];

                p.update();
                p.draw();

                if(p.life <= 0){

                    burstParticles.splice(i,1);
                }
            }

            // Mouse 拖尾
            for(let i = flowTrails.length - 1; i >= 0; i--){

                const trail = flowTrails[i];

                trail.update(time);
                trail.draw();

                if(trail.life < 0.02){

                    flowTrails.splice(i,1);
                }
            }
            // Mouse 光晕
            const glow = ctx.createRadialGradient(
                mouse.x, mouse.y, 0,
                mouse.x, mouse.y, 160
            );
            glow.addColorStop(0,"rgba(255,255,255,0.2)");
            glow.addColorStop(1,"rgba(242,242,242,0)");

            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 160, 0, Math.PI*2);
            ctx.fill();

            requestAnimationFrame(animate);
        }

        /* =========================
           EVENTS
        ========================= */

        window.addEventListener('mousemove',(e)=>{

            mouse.prevX = mouse.x;
            mouse.prevY = mouse.y;

            mouse.x = e.clientX;
            mouse.y = e.clientY;

            mouse.vx = mouse.x - mouse.prevX;
            mouse.vy = mouse.y - mouse.prevY;

            // 创建流体拖尾
            const speed = Math.sqrt(
                mouse.vx * mouse.vx +
                mouse.vy * mouse.vy
            );

            if(speed > 1){

                flowTrails.push(

                    new FlowTrail(
                        mouse.x,
                        mouse.y,
                        mouse.vx * 0.12,
                        mouse.vy * 0.12
                    )
                );
            }

            // 限制数量
            if(flowTrails.length > 120){

                flowTrails.shift();
            }
        });

        window.addEventListener('touchmove',(e)=>{

            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        function resize(){

            viewW = window.innerWidth;
            viewH = window.innerHeight;

            offscreen.width = viewW;
            offscreen.height = viewH;

            const canvases = [bgCanvas, fogCanvas, particleCanvas];

            canvases.forEach(c => {

                c.width = viewW * DPR;
                c.height = viewH * DPR;

                const cctx = c.getContext('2d');
                cctx.setTransform(1,0,0,1,0,0);
                cctx.scale(DPR, DPR);
            });
            createText();
            createDust();
        }
        window.addEventListener('resize', resize);
        

        /* =========================
           INIT
        ========================= */

        resize();
        createText();
        createDust();
        animate(0);

        /* =========================
           Circle Animation
        ========================= */

        const circles = document.querySelectorAll('.tech-circle');

        const circleState = Array.from(circles).map((el) => {

            const rect = el.getBoundingClientRect();

            return {
                el,
                cx: rect.left + rect.width / 2,
                cy: rect.top + rect.height / 2,
                radius: rect.width / 2,
                x: 0,
                y: 0
            };
        });

        function animateCircles(time){

            circles.forEach((el, i) => {

                const state = circleState[i];

                const hue = (time * 0.02 + i * 120) % 360;
                // 更新中心点（窗口缩放/布局变化）
                const rect = el.getBoundingClientRect();
                state.cx = rect.left + rect.width / 2;
                state.cy = rect.top + rect.height / 2;
                state.radius = rect.width / 2;

                const dx = mouse.x - state.cx;
                const dy = mouse.y - state.cy;

                const dist = Math.sqrt(dx * dx + dy * dy);

                // ========= 关键：只有进入范围才吸 =========
                const triggerRadius = state.radius * 1.4;

                if(dist < triggerRadius){
                    const force = 1 - (dist / triggerRadius);

                    const angle = Math.atan2(dy, dx);

                    const pull = force * 18; // 吸引强度

                    state.x += Math.cos(angle) * pull;
                    state.y += Math.sin(angle) * pull;
                }
                else{
                    // 回弹（恢复原位）
                    state.x *= 0.9;
                    state.y *= 0.9;
                }

                // 阻尼（让运动更柔）
                state.x *= 0.35;
                state.y *= 0.35;

                el.style.transform = `
                    translate3d(${state.x}px, ${state.y}px, 0)
                `;
                el.style.filter = `
                    hue-rotate(${hue}deg)
                `;
            });

            requestAnimationFrame(animateCircles);
        }

        animateCircles();

        </script>
    </body>
</html>
