<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Floating Particle Typography</title>
        <style>

            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
            }

            html,body{
                width:100%;
                height:100%;
                overflow:hidden;
                background:#f4f2ee;
                cursor:none;
            }

            .fui-background{
                position:fixed;
                inset:0;

                background:

                linear-gradient(
                    rgba(66,66,66,0.03) 1px,
                    transparent 1px
                ),

                linear-gradient(
                    90deg,
                    rgba(66,66,66,0.03) 1px,
                    transparent 1px
                );

                background-size:40px 40px;

                opacity:1;

                z-index:0;
            }

            .hud{
                position:fixed;
                inset:0;

                pointer-events:none;

                z-index:1;
            }

            .tech-circle{
                position:absolute;
                width:900px;
                height:900px;

                border:1px solid rgba(66,66,66,0.36);
                background:rgba(255,100,100,1);
                border-radius:50%;
                opacity:0.5;

                transform: translate3d(0,0,0);
                will-change: transform;
            }
            .tech-circle::before{
                content:"";
                position:absolute;
                inset:0;
                border-radius:70%;

                background:rgba(242,0,0,0.55);

                filter: blur(20px);
                transform: scale(1.05);

                z-index:-1;
            }
            .tech-circle-1{
                right:-10%;
                top:40%;
            }
            .tech-circle-2{
                left:-10%;
                top:-22%;
            }

            .text-title{
                margin-left:5px;
                font-size:12px;
                letter-spacing:3px;
                font-weight:2000;
                color:rgba(242,66,66,0.45);
                font-family:Helvetica, Arial, sans-serif;
            }
            .text-sub{
                margin-top:-10px;
                font-size:43px;
                font-weight:1000;
                letter-spacing:0px;
                color:rgba(242,242,242,0.95);
                font-family:Helvetica, Arial, sans-serif;
                white-space: nowrap;
            }
           
            .panel{
                position:absolute;
                backdrop-filter:blur(3px);
                font-size:12px;
                letter-spacing:2px;
                color:rgba(66,66,66,0.55);
                font-family:Arial,sans-serif;
            }
            .panel-1{
                padding:10px 10px;
                background:rgba(66,66,66,0.32);
                border:1px solid rgba(66,66,66,0.08);
                left:1.7%;
                bottom:5%;
                width:345px;
                height:60px;
            }
            .panel-2{
                right:5%;
                top:8%;
                width:120px;
                height:120px;
                z-index:10;
                background:none;
                border:none;
                opacity:1;
            }
            .logo{
                width:120px;
                height:auto;
                display:block;
                margin-bottom:8px;
                opacity:0.3;
            }

            .crosshair{
                position:absolute;

                left:50%;
                top:50%;

                width:120px;
                height:120px;

                transform:translate(-50%,-50%);
                border:1px solid rgba(66,66,66,0.04);
                border-radius:50%;
            }

            canvas{
                position:relative;
                z-index:2;
                display:block;
                width:100%;
                height:100%;
            }

            .hint{
                position:fixed;
                left:30px;
                bottom:24px;
                color:rgba(66,66,66,0.92);
                font-family:Arial, sans-serif;
                font-size:11px;
                letter-spacing:3px;
                pointer-events:none;
                user-select:none;
            }

            .enter-button{

                position:fixed;

                left:50%;
                bottom:42px;

                transform:translateX(-50%);

                width:64px;
                height:64px;

                border-radius:50%;

                border:1px solid rgba(66,66,66,0.18);

                display:flex;
                align-items:center;
                justify-content:center;

                background:rgba(66,66,66,0.03);

                backdrop-filter: blur(10px);

                text-decoration:none;

                opacity:0.65;

                transition:
                    transform 0.4s ease,
                    background 0.4s ease,
                    border-color 0.4s ease,
                    opacity 0.4s ease;

                z-index:100;

                animation: floatArrow 3s ease-in-out infinite;
            }

            .enter-button:hover{

                cursor:pointer;

                transform:
                    translateX(-50%)
                    translateY(-8px)
                    scale(1.08);

                background:rgba(66,66,66,0.08);

                border-color:rgba(66,66,66,0.4);

                opacity:1;
            }

            @keyframes floatArrow{

                0%{
                    transform:
                        translateX(-50%)
                        translateY(0px);
                }

                50%{
                    transform:
                        translateX(-50%)
                        translateY(-10px);
                }

                100%{
                    transform:
                        translateX(-50%)
                        translateY(0px);
                }
            }

            @keyframes drift{

                0%{
                    transform:translateY(0px);
                }

                50%{
                    transform:translateY(-12px);
                }

                100%{
                    transform:translateY(0px);
                }
            }

            .panel-2{
                animation:drift 10s ease-in-out infinite;
            }

            @keyframes driftB{

                0%{
                    transform:translateY(0px);
                }

                50%{
                    transform:translateY(-52px);
                }

                100%{
                    transform:translateY(0px);
                }
            }

        </style>
    </head>

    <body>
        <div class="fui-background"></div>
        <div class="hud">
            <div class="grid-lines"></div>
            <div class="tech-circle tech-circle-1"></div>
            <div class="tech-circle tech-circle-2"></div>
            <div class="panel panel-1">
                <div class="text-sub">CHEN ZHE 陈哲</div>
            </div>
            <div class="crosshair"></div>
        </div>

        <div class="panel panel-2">
                <img class="logo" src="logo_Cezy.png" alt="logo">
        </div>

        <canvas id="canvas"></canvas>

        <a class="enter-button" href="main.html">
            <svg width="22" height="22" viewBox="0 0 24 24">
                <path
                d="M12 5V19M12 19L6 13M12 19L18 13"
                stroke=#888888
                stroke-width="1.5"
                fill="none"
                stroke-linecap="round"
                stroke-linejoin="round"
                />
            </svg>
        </a>

        <div class="hint">
            COMMUNICATION UNIVERSITY OF ZHEJIANG
        </div>

        <script>

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const DPR = window.devicePixelRatio || 1;

        canvas.width = width * DPR;
        canvas.height = height * DPR;

        ctx.scale(DPR, DPR);

        const offscreen = document.createElement('canvas');
        const offCtx = offscreen.getContext('2d');

        offscreen.width = width;
        offscreen.height = height;

        const mouse = {
            x: width * 0.5,
            y: height * 0.5,
            radius: 140
        };

        const img = new Image();

        img.src = "logo_Cezy.png";

        img.onload = () => {
            ctx.drawImage(img, width/2 - 150, height/2 - 150, 300, 300);
        };

        let textParticles = [];
        let dustParticles = [];

        /* =========================
           TEXT PARTICLE
        ========================= */

        class TextParticle{

            constructor(x,y){

                this.originX = x;
                this.originY = y;

                this.x = x + (Math.random()-0.5)*10;
                this.y = y + (Math.random()-0.5)*10;

                this.vx = 0;
                this.vy = 0;

                this.size = Math.random() * 1.2 + 0.4;

                this.angle = Math.random() * Math.PI * 2;
                this.floatRadius = Math.random() * 2 + 1;

                this.ease = 0.005;
                this.friction = 0.70;
            }

            update(time){

                // 缓慢漂浮
                const driftX =
                    Math.sin(time * 0.0007 + this.angle * 3.7) * this.floatRadius;

                const driftY =
                    Math.cos(time * 0.0013 + this.angle * 2.1) * this.floatRadius;

                const floatX = this.originX + driftX;
                const floatY = this.originY + driftY;

                let dx = this.x - mouse.x;
                let dy = this.y - mouse.y;

                let dist = Math.sqrt(dx*dx + dy*dy);

                if(dist < mouse.radius){

                    let force = (mouse.radius - dist) / mouse.radius;

                    let angle = Math.atan2(dy,dx);

                    let push = force * 3.8;

                    this.vx += Math.cos(angle) * push;
                    this.vy += Math.sin(angle) * push;
                }

                // 回弹
                this.vx += (floatX - this.x) * this.ease;
                this.vy += (floatY - this.y) * this.ease;

                // 阻尼
                this.vx *= this.friction;
                this.vy *= this.friction;

                this.x += this.vx;
                this.y += this.vy;
            }

            draw(){

                ctx.beginPath();

                ctx.fillStyle = "rgba(66,66,66,0.95)";

                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);

                ctx.fill();
            }
        }

        /* =========================
           BACKGROUND DUST
        ========================= */

        class DustParticle{

            constructor(){

                this.reset();
            }

            reset(){

                this.x = Math.random() * width;
                this.y = Math.random() * height;

                this.size = Math.random() * 1.4 + 0.2;

                this.speedX = (Math.random()-0.5) * 0.08;
                this.speedY = (Math.random()-0.5) * 0.08;

                this.alpha = Math.random() * 0.3 + 0.35;
            }

            update(){

                this.x += this.speedX;
                this.y += this.speedY;

                if(this.x < 0) this.x = width;
                if(this.x > width) this.x = 0;

                if(this.y < 0) this.y = height;
                if(this.y > height) this.y = 0;
            }

            draw(){

                ctx.beginPath();

                ctx.fillStyle = `rgba(66,66,66,${this.alpha})`;

                ctx.arc(this.x,this.y,this.size,0,Math.PI*2);

                ctx.fill();
            }
        }

        /* =========================
           CREATE TEXT
        ========================= */

        function createText(){

            textParticles = [];

            offCtx.clearRect(0,0,width,height);

            const fontSize = Math.min(width * 0.28, 340);

            offCtx.fillStyle = "white";

            offCtx.textAlign = "center";
            offCtx.textBaseline = "middle";

            offCtx.font = `1000 ${fontSize}px Arial Black`;
            offCtx.fillText("三维动画", width/2, height/2);

            /*
            offCtx.font = `900 ${fontSize}px Arial Black`;
            offCtx.fillText("三维动画", width/2, height/2 - 80);
            offCtx.font = `900 120px Arial Black`;
            offCtx.fillText("陈哲", width/2, height/2 + 140);
            */

            const data = offCtx.getImageData(0,0,width,height).data;

            const gap = 6;

            for(let y=0; y<height; y+=gap){

                for(let x=0; x<width; x+=gap){

                    const index = (y * width + x) * 4;

                    if(data[index + 3] > 120){

                        textParticles.push(
                            new TextParticle(x,y)
                        );
                    }
                }
            }
        }

        /* =========================
           CREATE DUST
        ========================= */

        function createDust(){

            dustParticles = [];

            for(let i=0; i<900; i++){

                dustParticles.push(
                    new DustParticle()
                );
            }
        }

        /* =========================
           ANIMATION
        ========================= */

        function animate(time){

            ctx.clearRect(0,0,width,height);

            // 背景渐层暗雾
            const gradient = ctx.createRadialGradient(
                width/2,
                height/2,
                0,
                width/2,
                height/2,
                width*0.7
            );

            gradient.addColorStop(0,"rgba(232,232,232,0.15)");
            gradient.addColorStop(1,"rgba(242,242,242,0.92)");

            ctx.fillStyle = gradient;
            ctx.fillRect(0,0,width,height);

            // dust
            for(let dust of dustParticles){

                dust.update();
                dust.draw();
            }

            // text
            for(let particle of textParticles){

                particle.update(time);
                particle.draw();
            }

            // 鼠标光晕
            const glow = ctx.createRadialGradient(
                mouse.x,
                mouse.y,
                0,
                mouse.x,
                mouse.y,
                160
            );

            glow.addColorStop(0,"rgba(66,66,66,0.06)");
            glow.addColorStop(1,"rgba(66,66,66,0)");

            ctx.fillStyle = glow;

            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 160, 0, Math.PI*2);
            ctx.fill();

            requestAnimationFrame(animate);
        }

        /* =========================
           EVENTS
        ========================= */

        window.addEventListener('mousemove',(e)=>{

            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('touchmove',(e)=>{

            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        window.addEventListener('resize',()=>{

            width = window.innerWidth;
            height = window.innerHeight;

            canvas.width = width * DPR;
            canvas.height = height * DPR;

            ctx.scale(DPR,DPR);

            offscreen.width = width;
            offscreen.height = height;

            createText();
            createDust();
        });

        /* =========================
           INIT
        ========================= */

        createText();
        createDust();

        animate(0);

        /* =========================
           circleAnimation
        ========================= */

        const circles = document.querySelectorAll('.tech-circle');

        const circleState = Array.from(circles).map((el) => {

            const rect = el.getBoundingClientRect();

            return {
                el,
                cx: rect.left + rect.width / 2,
                cy: rect.top + rect.height / 2,
                radius: rect.width / 2,
                x: 0,
                y: 0
            };
        });

        function animateCircles(){

            circles.forEach((el, i) => {

                const state = circleState[i];

                // 更新中心点（窗口缩放/布局变化）
                const rect = el.getBoundingClientRect();
                state.cx = rect.left + rect.width / 2;
                state.cy = rect.top + rect.height / 2;
                state.radius = rect.width / 2;

                const dx = mouse.x - state.cx;
                const dy = mouse.y - state.cy;

                const dist = Math.sqrt(dx * dx + dy * dy);

                // ========= 关键：只有进入范围才吸 =========
                const triggerRadius = state.radius * 1.4;

                if(dist < triggerRadius){
                    const force = 1 - (dist / triggerRadius);

                    const angle = Math.atan2(dy, dx);

                    const pull = force * 18; // 吸引强度

                    state.x += Math.cos(angle) * pull;
                    state.y += Math.sin(angle) * pull;
                }
                else{
                    // 回弹（恢复原位）
                    state.x *= 0.9;
                    state.y *= 0.9;
                }

                // 阻尼（让运动更柔）
                state.x *= 0.35;
                state.y *= 0.35;

                el.style.transform = `
                    translate3d(${state.x}px, ${state.y}px, 0)
                `;
            });

            requestAnimationFrame(animateCircles);
        }

        animateCircles();

        </script>
    </body>
</html>
